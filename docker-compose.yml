services:
  n8n:
    # Build from local Dockerfile (extends n8nio/n8n:2.11.4 + installs our npm deps)
    # Run `docker compose up --build` when package.json changes.
    build: .
    restart: unless-stopped
    ports:
      # Bind to localhost only — never expose to LAN (spec Section 9)
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    environment:
      # n8n 2.x uses built-in user management (set up via UI on first run).
      # N8N_BASIC_AUTH_* was removed in n8n 1.0+.
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Pass secrets to n8n container so Code nodes can read process.env
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}
      # Container path — ./data is mounted at /home/node/data.
      # The host .env DB_PATH is only used by scripts run directly on the host (e.g. db:init).
      - DB_PATH=/home/node/data/agent.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Allow Code nodes to use our npm dependencies and Node builtins
      - NODE_FUNCTION_ALLOW_EXTERNAL=better-sqlite3,@anthropic-ai/sdk
      - NODE_FUNCTION_ALLOW_BUILTIN=*
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
      - ./scripts:/home/node/scripts
      - ./data:/home/node/data

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}
      - DB_PATH=/home/node/data/agent.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - TILLER_SHEET_ID=${TILLER_SHEET_ID}
    volumes:
      - ./scripts:/home/node/scripts
      - ./data:/home/node/data
    depends_on:
      - n8n

volumes:
  n8n_data:
