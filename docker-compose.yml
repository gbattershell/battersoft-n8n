services:
  n8n:
    # Pin to a specific version — check hub.docker.com/r/n8nio/n8n/tags for latest stable
    image: n8nio/n8n:2.11.4
    restart: unless-stopped
    ports:
      # Bind to localhost only — never expose to LAN (spec Section 9)
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Pass secrets to n8n container so Code nodes can read process.env
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}
      - DB_PATH=${DB_PATH}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Allow Code nodes to use our npm dependencies and Node builtins
      - NODE_FUNCTION_ALLOW_EXTERNAL=better-sqlite3,@anthropic-ai/sdk
      - NODE_FUNCTION_ALLOW_BUILTIN=*
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
      - ./scripts:/home/node/scripts
      - ./data:/home/node/data

volumes:
  n8n_data:
